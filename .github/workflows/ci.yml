name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least-privilege default; each job widens only what it needs.
permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  # Superseded PR runs are cancelled, but pushes to main queue instead: a
  # cancelled main run deploys nothing, and if the newer run then fails, Pages
  # would be left without a successful deploy for either commit.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    name: Build & check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read # checkout only; no write access needed
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # full history so gitleaks scans every commit rather than just the shallow HEAD snapshot
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - name: Install npm pinned in engines.npm
        # zizmor: ignore[adhoc-packages] npm itself has no lockfile; pinned to engines.npm
        run: npm install -g "npm@$(node -p 'require("./package.json").engines.npm')"
      - name: Install opengrep
        env:
          # keep in sync with OPENGREP_VERSION in .devcontainer/Dockerfile
          OPENGREP_VERSION: 1.25.0
        # Download the pinned release binary directly instead of using install.sh:
        # the installer lists releases via the unauthenticated GitHub API, which
        # gets rate-limited on shared runners (HTTP 403 -> "Failed to fetch
        # available versions from GitHub").
        run: |
          install_dir="$HOME/.opengrep/cli/latest"
          mkdir -p "$install_dir"
          curl -fsSL --retry 3 --retry-all-errors \
            -o "$install_dir/opengrep" \
            "https://github.com/opengrep/opengrep/releases/download/v${OPENGREP_VERSION}/opengrep_manylinux_x86"
          chmod +x "$install_dir/opengrep"
          echo "$install_dir" >> "$GITHUB_PATH"
          "$install_dir/opengrep" --version
      - name: Install gitleaks
        env:
          # keep in sync with GITLEAKS_VERSION in .devcontainer/Dockerfile
          GITLEAKS_VERSION: 8.30.1
        run: |
          install_dir="$HOME/.gitleaks/bin"
          mkdir -p "$install_dir"
          curl -fsSL --retry 3 --retry-all-errors \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C "$install_dir" gitleaks
          echo "$install_dir" >> "$GITHUB_PATH"
          "$install_dir/gitleaks" version
      - name: Install zizmor
        env:
          # keep in sync with ZIZMOR_VERSION in .devcontainer/Dockerfile
          ZIZMOR_VERSION: 1.27.0
        run: |
          install_dir="$HOME/.zizmor/bin"
          mkdir -p "$install_dir"
          curl -fsSL --retry 3 --retry-all-errors \
            "https://github.com/zizmorcore/zizmor/releases/download/v${ZIZMOR_VERSION}/zizmor-x86_64-unknown-linux-gnu.tar.gz" \
            | tar -xz -C "$install_dir" zizmor
          echo "$install_dir" >> "$GITHUB_PATH"
          "$install_dir/zizmor" --version
      - name: Install trivy
        env:
          # keep in sync with TRIVY_VERSION in .devcontainer/Dockerfile
          TRIVY_VERSION: 0.72.0
        run: |
          install_dir="$HOME/.trivy/bin"
          mkdir -p "$install_dir"
          curl -fsSL --retry 3 --retry-all-errors \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            | tar -xz -C "$install_dir" trivy
          echo "$install_dir" >> "$GITHUB_PATH"
          "$install_dir/trivy" --version
      - name: Trivy DB cache date
        id: trivy-db-date
        # The Trivy vuln DB refreshes ~daily upstream, so key the cache on the
        # date: the first run of a day saves one entry and every later same-day
        # run is an exact hit (no multi-hundred-MB re-upload). restore-keys still
        # warm-starts a new day from the previous day's DB before updating it,
        # avoiding a full re-download (and the GHCR rate limits that come with it).
        run: echo "date=$(date +%F)" >> "$GITHUB_OUTPUT"
      - name: Cache trivy data (vuln DB + misconfig checks)
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/trivy
          key: trivy-${{ runner.os }}-${{ steps.trivy-db-date.outputs.date }}
          restore-keys: |
            trivy-${{ runner.os }}-
      - run: npm ci
      - name: Verify registry signatures and provenance
        run: npm audit signatures
      - name: Validate renovate config
        run: npm run renovate:validate
      - run: npm run check:code
      - name: Lint workflows
        # Same npm script the pre-commit hook runs, so CI and local use one
        # source of truth. Kept out of check:code to match the hook's scope:
        # workflows are linted when they change, not on every push.
        run: npm run scan:workflows
      - name: Generate SBOM (CycloneDX)
        run: npm run sbom
      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.cdx.json
          retention-days: 30
      - name: Scan Dockerfile base image for OS CVEs
        # `scan:image` reads the pinned FROM image out of the Dockerfile (single
        # stage, literal ref) so CI and local runs scan the exact same base and
        # never drift from the digest Renovate bumps there. Gates on fixable
        # HIGH/CRITICAL only: a failure means "bump the pinned base". Runs in this
        # job — not a separate one — to reuse the trivy binary and warm vuln DB.
        run: npm run scan:image
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          # keyed on the Playwright version rather than the whole lockfile so
          # unrelated dependency bumps don't re-download browsers
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - run: npx playwright install-deps chromium
      - run: npx playwright install chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
      - run: npm run check:build
      - name: Upload Playwright traces (failures and flaky retries)
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-test-results
          path: test-results
          if-no-files-found: ignore
          retention-days: 7
      - name: Build for deploy
        if: github.ref == 'refs/heads/main'
        run: npm run build
        env:
          DEPLOY_BASE_PATH: /${{ github.event.repository.name }}/
      - name: Upload dist
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist
          retention-days: 1

  deploy:
    name: Deploy to Pages
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write # peaceiris/actions-gh-pages pushes the built site to the gh-pages branch
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist
      - uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
