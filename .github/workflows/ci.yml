name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  # Superseded PR runs are cancelled, but pushes to main queue instead: a
  # cancelled main run deploys nothing, and if the newer run then fails, Pages
  # would be left without a successful deploy for either commit.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - name: Install npm pinned in engines.npm
        run: npm install -g "npm@$(node -p 'require("./package.json").engines.npm')"
      - name: Install opengrep
        env:
          # keep version and checksum in sync with the OPENGREP_* ARGs in .devcontainer/Dockerfile
          OPENGREP_VERSION: 1.25.0
          OPENGREP_SHA256: 9ac4aebb47ba3f7b0d8fc641ac8749cb6c2f253f616131a67d9631e00d4bea33
        # Download the pinned release binary directly instead of using install.sh:
        # the installer lists releases via the unauthenticated GitHub API, which
        # gets rate-limited on shared runners (HTTP 403 -> "Failed to fetch
        # available versions from GitHub").
        run: |
          install_dir="$HOME/.opengrep/cli/latest"
          mkdir -p "$install_dir"
          curl -fsSL --retry 3 --retry-all-errors \
            -o "$install_dir/opengrep" \
            "https://github.com/opengrep/opengrep/releases/download/v${OPENGREP_VERSION}/opengrep_manylinux_x86"
          echo "${OPENGREP_SHA256}  $install_dir/opengrep" | sha256sum -c -
          chmod +x "$install_dir/opengrep"
          echo "$install_dir" >> "$GITHUB_PATH"
          "$install_dir/opengrep" --version
      - run: npm ci
      - name: Verify registry signatures and provenance
        run: npm audit signatures
      - run: npm run check:code
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install-deps chromium
      - run: npx playwright install chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
      - run: npm run check:build
      - name: Build for deploy
        if: github.ref == 'refs/heads/main'
        # build:only skips the typecheck that already gated check:code and
        # check:build earlier in this job
        run: npm run build:only
        env:
          DEPLOY_BASE_PATH: /${{ github.event.repository.name }}/
      - name: Upload dist
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist
      - uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
