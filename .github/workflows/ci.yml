name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - name: Install npm pinned in engines.npm
        run: npm install -g "npm@$(node -p 'require("./package.json").engines.npm')"
      - name: Install opengrep
        env:
          OPENGREP_VERSION: 1.25.0 # keep in sync with ARG OPENGREP_VERSION in .devcontainer/Dockerfile
        run: |
          curl -fsSL "https://raw.githubusercontent.com/opengrep/opengrep/v${OPENGREP_VERSION}/install.sh" \
            | bash -s -- -v "v${OPENGREP_VERSION}"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - run: npm ci
      - name: Verify registry signatures and provenance
        run: npm audit signatures
      - run: npm run check:code
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install-deps
      - run: npx playwright install chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
      - run: npm run check:build
      - name: Build for deploy
        if: github.ref == 'refs/heads/main'
        run: npm run build
        env:
          DEPLOY_BASE_PATH: /${{ github.event.repository.name }}/
      - name: Upload dist
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist
      - uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
