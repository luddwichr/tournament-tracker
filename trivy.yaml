# Trivy configuration — auto-loaded from the repo root.
#
# Only the license-classification policy lives here; it is inert for the vuln,
# config and SBOM runs. Scanners, severities and exit codes are passed per
# invocation by the npm scripts (see "licenses", "vulns", "dockerfile", "sbom").
#
# License policy: PERMISSIVE licenses only. Trivy maps every license category to
# a severity — permissive / notice / unencumbered -> LOW, reciprocal -> MEDIUM,
# restricted -> HIGH, forbidden -> CRITICAL, unrecognized -> UNKNOWN. The
# "licenses" npm script fails on UNKNOWN,MEDIUM,HIGH,CRITICAL, so anything not
# classified as permissive below (or by Trivy's built-in license DB) blocks the
# build and needs an explicit, deliberate decision recorded here.
license:
  # Package-scoped exceptions to the permissive-only rule (e.g. the MPL-2.0
  # allowance for the build-time-only lightningcss/Vite dependency) live in
  # .trivy/license-exceptions.rego, passed via --ignore-policy in the "licenses"
  # script — scoping each waiver to a specific package rather than blanket-
  # allowing a license everywhere.
  #
  # Blessed permissive SPDX identifiers. Trivy already classifies most of these
  # as LOW; listing them makes the policy explicit and pins any that its DB would
  # otherwise report as UNKNOWN (e.g. BlueOak-1.0.0).
  permissive:
    - 0BSD
    - Apache-2.0
    - BSD-2-Clause
    - BSD-3-Clause
    - BlueOak-1.0.0
    - ISC
    - MIT
    - MIT-0
    - Python-2.0
    - Zlib
  unencumbered:
    - CC0-1.0
    - Unlicense
