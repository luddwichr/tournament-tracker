<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="description" content="Offline-Tracker für die FIFA Weltmeisterschaft 2026" />
    <!-- csp:start (stripped in dev by vite.config.ts — see comment there) -->
    <!--
      GH Pages serves static files with no control over HTTP response headers,
      so this <meta> tag is the only way to ship a CSP at all.
      - default-src 'self': fallback for any directive not listed below.
      - script-src 'self': only same-origin script files run; no inline
        scripts, no 'unsafe-inline'/'unsafe-eval'. All boot-time scripts are
        loaded via <script src> from public/ so they qualify.
      - style-src 'self': same, for stylesheets — no inline <style>/style="".
      - img-src 'self': only same-origin images.
      - connect-src 'self' https://site.api.espn.com: fetch/XHR targets,
        scoped to same-origin plus the ESPN scoreboard API, the app's only external
        network dependency.
      - base-uri 'self': blocks a <base> tag from redirecting relative URLs
        (script/style/img src, fetches) elsewhere.
      - form-action 'none': the app has no <form> submissions.
      - object-src 'none': blocks <object>/<embed>/<applet> plugin content.
      - frame-ancestors is deliberately omitted: it's a header-only directive
        per spec, ignored (with a console warning) when set via <meta> —
        framing protection would need an actual HTTP header, which GH Pages
        doesn't let us set.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self'; connect-src 'self' https://site.api.espn.com; base-uri 'self'; form-action 'none'; object-src 'none'"
    />
    <!-- csp:end -->
    <link rel="icon" type="image/png" href="/tournament-tracker/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/tournament-tracker/icons/icon-192.png" />
    <title>WM 2026 Tracker</title>
    <link rel="stylesheet" href="/tournament-tracker/boot-fallback.css" />
    <script type="text/javascript" src="/tournament-tracker/boot-safety-net.js"></script>
    <script type="text/javascript" src="/tournament-tracker/spa-github-pages.js"></script>
    <script type="module" crossorigin src="/tournament-tracker/assets/index-tFowxuXc.js"></script>
    <link rel="modulepreload" crossorigin href="/tournament-tracker/assets/teams-yz6HWWUl.js">
    <link rel="stylesheet" crossorigin href="/tournament-tracker/assets/index-kIeSknAw.css">
  <link rel="manifest" href="/tournament-tracker/manifest.webmanifest"></head>
  <body>
    <noscript>
      <p class="boot-fallback">
        Der WM 2026 Tracker benötigt JavaScript. Bitte aktiviere JavaScript in deinem Browser.
      </p>
    </noscript>
    <div id="app"></div>
    <script type="text/javascript" nomodule src="/tournament-tracker/boot-fallback-nomodule.js"></script>
  </body>
</html>
