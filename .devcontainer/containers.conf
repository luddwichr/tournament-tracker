# Podman configuration for rootless podman-in-podman. Copied to
# /etc/containers/containers.conf by the devcontainer Dockerfile.
#
# There is no systemd and no delegated cgroup hierarchy inside the devcontainer,
# so cgroup management is disabled entirely, the outer namespaces are reused
# instead of nesting new ones, and events/logs are written to files rather than
# journald.
# Otherwise podman fails trying to reach services that are not there.
#
# Based on the working reference at
# github.com/andrena/software-excellence-day-2026-sandboxing (demos/3).

[containers]
# user-space networking: worse performance than netns="host", but allows port
# remapping. Requires /dev/net/tun, passed in via runArgs in devcontainer.json.
netns = "pasta"
userns = "host"
ipcns = "host"
utsns = "host"
cgroupns = "host"
cgroups = "disabled"
log_driver = "k8s-file"

# workaround for crun mount issues inside a nested container
default_sysctls = []
volumes = ["/proc:/proc"]

[engine]
cgroup_manager = "cgroupfs"
events_logger = "file"
runtime = "crun"
