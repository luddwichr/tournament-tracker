# Podman storage configuration for rootless podman-in-podman. Copied to
# /etc/containers/storage.conf by the devcontainer Dockerfile.
#
# Points the overlay driver at fuse-overlayfs so storage works nested inside the
# outer container's own overlay filesystem — the kernel refuses to stack overlay
# on overlay directly. Written by hand rather than derived from a shipped
# template (as the upstream reference does): Debian's podman package installs no
# storage.conf at all.
#
# graphroot/runroot are deliberately omitted so podman keeps its rootless
# defaults — ~/.local/share/containers/storage, which is a volume so it stays off
# the container's overlay filesystem and survives rebuilds (see devcontainer.json).

[storage]
driver = "overlay"

[storage.options.overlay]
mount_program = "/usr/bin/fuse-overlayfs"
mountopt = "nodev,fsync=0"
