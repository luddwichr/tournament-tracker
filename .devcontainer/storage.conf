# Podman storage configuration for rootless podman-in-podman. Copied to
# /etc/containers/storage.conf by the devcontainer Dockerfile.
#
# Points the overlay driver at fuse-overlayfs so storage works nested inside the
# outer container's own overlay filesystem, because the kernel refuses to stack overlay on overlay directly.
# This is written by hand rather than derived from a shipped template, because Debian's podman package installs no
# storage.conf at all.
#
# graphroot/runroot are deliberately omitted so podman keeps its rootless
# defaults of ~/.local/share/containers/storage.
# That is a volume, so it stays off the container's overlay filesystem and survives rebuilds.
# See devcontainer.json.

[storage]
driver = "overlay"

[storage.options.overlay]
mount_program = "/usr/bin/fuse-overlayfs"
mountopt = "nodev,fsync=0"
