<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <title>WM 2026 Tracker</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // GitHub Pages serves this file for any path it doesn't recognize (e.g.
      // a deep link, refresh, or bookmark to /tournament-tracker/groups on a
      // fresh visit, before the service worker's own navigation fallback is
      // installed). It re-encodes the path into a query string and redirects
      // to the app root, where the matching decode script in index.html
      // restores the real path via history.replaceState before the router
      // reads it.
      ;(function () {
        const repoSegments = 1 // number of segments in the /<repo>/ GH Pages base path
        const location = window.location
        const segments = location.pathname.slice(1).split('/')
        const base = segments.slice(0, repoSegments).join('/')
        const route = segments.slice(repoSegments).join('/').replace(/&/g, '~and~')
        const query = location.search ? '&' + location.search.slice(1).replace(/&/g, '~and~') : ''

        location.replace(location.origin + '/' + base + '/?/' + route + query + location.hash)
      })()
    </script>
  </head>
  <body></body>
</html>
